<script>

    var day30_order = 0;

    //展示小时的趋势图
function show_flow_order_h(){

    $.ajax({
        url: '<?php echo url("getflowdata_h"); ?>',
        type: 'GET'
    }).done(function(data) {
        
        

            var myChart = echarts.init(document.getElementById('main_flow_h'));
          

        option = {
            title: {
              text: '作品小时的趋势'
            },
            tooltip: {
              trigger: 'axis'
            },
            legend: {
              data: ['作品量']
            },
            grid: {
              left: '3%',
              right: '4%',
              bottom: '3%',
              containLabel: true
            },
            toolbox: {
              feature: {
                saveAsImage: {}
              }
            },
            xAxis: {
              type: 'category',
              boundaryGap: false,
              data: data.x_data
            },
            yAxis: {
              type: 'value'
            },
            series: [
              {
                label: {
                    show: true,
                    position: 'top'
                  },
                name: '作品量',
                type: 'line',
                smooth: true,
                data: data.y_data
              }
            ]
          };


        myChart.setOption(option);

        // console.log(data.y_data);

        // for (var i = 0; i < data.y_data.length; i++) {

}
