<div class="form-group col-lg-12 col-md-12 col-sm-12 col-xs-12 "> 
    <label class="col-xs-12" for="{$form[type].name}">{$form[type].title|htmlspecialchars}</label> 
    <div class="col-xs-12 "> 
     <div id="" class="uploader-list"> 
     </div> 
     <div class="clearfix"></div> 
     <input type="hidden" class="ali_webupload_pick" name="{$form[type].name}" data-multiple="false" data-watermark="" data-thumb="30,30|1" data-size="0" data-ext="gif,jpg,jpeg,bmp,png" id="ali_upload_value_{$form[type].name}" value="{$form[type]['value']}" /> 
     <div class="webuploader-container">
    <input class="btn btn-minw btn-primary ali_webupload_pick"  id="ali_upload_input_{$form[type].name}"  type="file"  name="file" accept="image/*" style="display: none"/>
    
    <div id="file_list_{$form[type].name}" class="uploader-list">
        <div class="file-item thumbnail">
            <div class="progress" style="display: none;">
                <div class="progress-bar progress-bar-success" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%;">
                </div>
              </div>
            <img id="ali_upload_src_{$form[type].name}" class="ali_webupload_pick" data-original="{$form[type]['value']}" src="{$form[type]['value']}" width="100px">
            <!-- <i class="fa fa-times-circle remove-picture"></i> -->
        </div>
        
    </div>

    <div class="clearfix"></div>
    <div id="ali_upload_btn_{$form[type].name}" class="webuploader-pick ali_webupload_pick" for="ali_upload_input_{$form[type].name}" >上传云端图片</div>
    <div style="margin-top:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
            <input type="text" class="form-control" id="ali_upload_url_{$form[type].name}" placeholder="或直接粘贴图片链接" style="flex:1;" />
            <button type="button" class="btn btn-success btn-sm" onclick="
                var url = document.getElementById('ali_upload_url_{$form[type].name}').value.trim();
                if(url){
                    document.getElementById('ali_upload_value_{$form[type].name}').value = url;
                    document.getElementById('ali_upload_src_{$form[type].name}').src = url;
                    document.getElementById('ali_upload_src_{$form[type].name}').setAttribute('data-original', url);
                }
            ">确认</button>
        </div>
    </div>
      
     </div> 
    </div> 
   </div>
